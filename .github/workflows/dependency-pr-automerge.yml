name: Dependency PR auto-merge and notify

# Conservative: auto-merge ONLY patch workflow PRs (label `auto-merge`) and
# Dependabot security PRs (label `security`). All other dependency PRs need manual merge.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: |
      github.event.action != 'closed' &&
      (
        contains(join(github.event.pull_request.labels.*.name, ','), 'auto-merge') ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'security') ||
        (
          github.actor == 'dependabot[bot]' &&
          contains(join(github.event.pull_request.labels.*.name, ','), 'dependencies')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Email — dependency PR opened (auto-merge queued)
        if: github.event.action == 'opened'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[pg-application] Dependency PR opened (auto-merge queued)"
          to: mayinxing@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            A dependency pull request was opened and auto-merge has been queued.

            Only patch updates and security fixes are auto-merged. Minor/major PRs require manual review.

            It will merge automatically once all required checks pass.

            PR: ${{ github.event.pull_request.html_url }}
            Title: ${{ github.event.pull_request.title }}
            Branch: ${{ github.head_ref }}
            Labels: ${{ join(github.event.pull_request.labels.*.name, ', ') }}

            Repository: ${{ github.repository }}

  notify-manual-review:
    if: |
      github.event.action == 'opened' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'dependencies') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'auto-merge') &&
      !contains(join(github.event.pull_request.labels.*.name, ','), 'security') &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Email — dependency PR needs manual review
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[pg-application] Dependency PR needs manual review"
          to: mayinxing@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            A dependency pull request was opened that is NOT eligible for auto-merge.

            Please review and merge manually when ready.

            PR: ${{ github.event.pull_request.html_url }}
            Title: ${{ github.event.pull_request.title }}
            Branch: ${{ github.head_ref }}

            Repository: ${{ github.repository }}

  notify-merged:
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'dependencies')
    runs-on: ubuntu-latest
    steps:
      - name: Email — dependency PR merged
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[pg-application] Dependency updates merged"
          to: mayinxing@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Dependency updates were merged into the default branch.

            PR: ${{ github.event.pull_request.html_url }}
            Title: ${{ github.event.pull_request.title }}

            Repository: ${{ github.repository }}
