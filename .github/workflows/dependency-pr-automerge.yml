name: Dependency PR auto-merge and notify

# Enables auto-merge once CI passes, and emails on open/merge for dependency PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: |
      github.event.action != 'closed' &&
      (
        startsWith(github.head_ref, 'automation/deps-security') ||
        startsWith(github.head_ref, 'dependabot/') ||
        github.actor == 'dependabot[bot]'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Email — dependency PR opened
        if: github.event.action == 'opened'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[pg-application] Dependency update PR opened (auto-merge queued)"
          to: mayinxing@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            A dependency update pull request was opened and auto-merge has been queued.

            It will merge automatically once all required checks pass.

            PR: ${{ github.event.pull_request.html_url }}
            Title: ${{ github.event.pull_request.title }}
            Branch: ${{ github.head_ref }}

            Repository: ${{ github.repository }}

  notify-merged:
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      (
        startsWith(github.head_ref, 'automation/deps-security') ||
        startsWith(github.head_ref, 'dependabot/') ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'dependencies')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Email — dependency PR merged
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[pg-application] Dependency updates merged"
          to: mayinxing@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Dependency updates were merged into the default branch.

            PR: ${{ github.event.pull_request.html_url }}
            Title: ${{ github.event.pull_request.title }}

            Repository: ${{ github.repository }}
