name: Dependency security update

# Required repo secrets for email notifications:
#   MAIL_USERNAME  — Gmail address used to send (e.g. mayinxing@gmail.com)
#   MAIL_PASSWORD  — Gmail App Password (https://myaccount.google.com/apppasswords)
#
# Required repo setting:
#   Settings → General → Allow auto-merge (enabled)

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      update_target:
        description: "npm-check-updates target (minor, latest, patch)"
        required: false
        default: minor
        type: choice
        options:
          - minor
          - latest
          - patch
      dry_run:
        description: "Audit only — do not open a PR"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-security
  cancel-in-progress: false

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security update
        env:
          UPDATE_TARGET: ${{ github.event.inputs.update_target || 'minor' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/security-update.mjs --dry-run
          else
            node scripts/security-update.mjs --target=${UPDATE_TARGET}
          fi

      - name: Verify typecheck
        if: github.event.inputs.dry_run != true
        run: npm run typecheck

      - name: Verify build
        if: github.event.inputs.dry_run != true
        run: npm run build

      - name: Create pull request
        if: github.event.inputs.dry_run != true
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/deps-security-${{ github.run_number }}
          delete-branch: true
          commit-message: "chore(deps): automated security and dependency update"
          title: "chore(deps): automated security and dependency update"
          labels: |
            dependencies
            security
          body: |
            ## Summary

            Automated daily dependency maintenance:

            - `npm audit` before and after
            - `npm-check-updates` (target: `${{ github.event.inputs.update_target || 'minor' }}`)
            - `npm audit fix` + workspace refresh
            - Verified with `npm run typecheck` and `npm run build`

            See `security-update-report.md` in this PR for the audit summary.

            Auto-merge is enabled — this PR will merge once CI checks pass.

            ## Notes

            - TypeScript 7.x is excluded (Next.js 16 requires TypeScript 5.x).
            - Review major-version bumps carefully before merging.

            ---
            _Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}_
          add-paths: |
            package.json
            package-lock.json
            apps/**/package.json
            packages/**/package.json
            security-update-report.md

  notify-failure:
    needs: scan-and-update
    if: failure() && github.event.inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - name: Email — dependency update workflow failed
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[pg-application] Dependency update workflow FAILED"
          to: mayinxing@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            The daily dependency security workflow failed. No PR was created or merged.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Repository: ${{ github.repository }}

            Check the Actions log for details (typecheck/build failure, audit error, etc.).
